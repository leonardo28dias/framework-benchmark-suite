collection_id: binary_clean
name: Binary Clean Classification
description: Automatically generated collection of binary clean classification datasets
  from configuration criteria.
selection_expression: (task == classification AND task_subtype == binary) AND (missing_rate
  <= 0.05) AND (n_features <= 50) AND temporal == False
selection_criteria:
  all_of:
  - field: task
    op: ==
    value: classification
  - field: task_subtype
    op: ==
    value: binary
  - field: missing_rate
    op: <=
    value: 0.05
  - field: n_features
    op: <=
    value: 50
  - field: temporal
    op: ==
    value: false
preferred_sorting:
- field: n_instances
  order: desc
output_fields:
- dataset_id
- name
- task
- task_subtype
- target_variable
- source_repository
- source_id
- n_instances
- n_features
- n_classes
- missing_rate
- imbalance_ratio
- temporal
- grouped
- academic_usage
- license
- status
curation:
  version: '1.1'
  author: Leonardo Dias
  date: '2026-06-19'
